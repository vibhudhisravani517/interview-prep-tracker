{% extends "base.html" %}
{% block title %}Edit Task – Interview Prep Tracker{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Task</h1>
  <p>Update your task details</p>
</div>

<div class="card form-card">
  <form method="post" action="{{ url_for('edit_task', task_id=task.id) }}">
    <div class="form-group">
      <label for="title">Task Title *</label>
      <input type="text" id="title" name="title" required value="{{ task.title }}">
    </div>

    <div class="form-group">
      <label for="topic">Related Topic (optional)</label>
      <input type="text" id="topic" name="topic" value="{{ task.topic or '' }}"
             placeholder="e.g. Binary Trees, Dynamic Programming">
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="due_date">Due Date (optional)</label>
        <input type="date" id="due_date" name="due_date"
               value="{{ task.due_date.strftime('%Y-%m-%d') if task.due_date else '' }}">
      </div>
      <div class="form-group">
        <label for="priority">Priority</label>
        <select id="priority" name="priority">
          <option value="high"   {{ 'selected' if task.priority=='high' }}>🔴 High</option>
          <option value="medium" {{ 'selected' if task.priority=='medium' }}>🟡 Medium</option>
          <option value="low"    {{ 'selected' if task.priority=='low' }}>🟢 Low</option>
        </select>
      </div>
      <div class="form-group">
        <label for="status">Status</label>
        <select id="status" name="status">
          {% for s in statuses %}
          <option value="{{ s.id }}" {{ 'selected' if task.status==s.id }}>{{ s.label }}</option>
          {% endfor %}
        </select>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">Save Changes</button>
      <a href="{{ url_for('task_list') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
