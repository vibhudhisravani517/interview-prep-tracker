<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Register – Interview Prep Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">🎯</div>
    <h1 class="auth-title">Create account</h1>
    <p class="auth-subtitle">Start tracking your interview preparation</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" style="margin-bottom:.75rem;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('register') }}">
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required
               placeholder="you@example.com"
               value="{{ form_data.get('email', '') }}"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="At least 6 characters"/>
      </div>
      <div class="form-group">
        <label for="confirm_password">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" required
               placeholder="Repeat your password"/>
      </div>
      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" name="role">
          <option value="student" {{ 'selected' if form_data.get('role','student') == 'student' }}>
            🎓 Student
          </option>
          <option value="admin" {{ 'selected' if form_data.get('role') == 'admin' }}>
            🛡️ Admin
          </option>
        </select>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:.7rem;">Create account</button>
    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>
</body>
</html>
