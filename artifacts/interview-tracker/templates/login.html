<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login – Interview Prep Tracker</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}"/>
</head>
<body class="auth-body">
  <div class="auth-card">
    <div class="auth-logo">🎯</div>
    <h1 class="auth-title">Welcome back</h1>
    <p class="auth-subtitle">Sign in to your account</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}" style="margin-bottom:.75rem;">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="post" action="{{ url_for('login') }}">
      <input type="hidden" name="next" value="{{ next_url }}"/>
      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email" required
               placeholder="you@example.com" value="{{ form_email }}"/>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required
               placeholder="Your password"/>
      </div>
      <button type="submit" class="btn-primary" style="width:100%;padding:.7rem;">Sign in</button>
    </form>

    <p class="auth-footer">
      Don't have an account?
      <a href="{{ url_for('register') }}">Create one</a>
    </p>
  </div>
</body>
</html>
