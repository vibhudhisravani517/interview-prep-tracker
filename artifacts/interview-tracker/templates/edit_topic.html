{% extends "base.html" %}
{% block title %}Edit Topic – Interview Prep Tracker{% endblock %}

{% block content %}
<div class="page-header">
  <h1>Edit Topic</h1>
  <p>Update your preparation topic details</p>
</div>

<div class="card form-card">
  <form method="post" action="{{ url_for('edit_topic', topic_id=topic.id) }}">
    <div class="form-group">
      <label for="title">Topic Title *</label>
      <input type="text" id="title" name="title" required value="{{ topic.title }}">
    </div>

    <div class="form-group">
      <label for="description">Description (optional)</label>
      <textarea id="description" name="description">{{ topic.description or '' }}</textarea>
    </div>

    <div class="form-group">
      <label for="category">Category *</label>
      <select id="category" name="category" required>
        {% for cat in categories %}
        <option value="{{ cat.id }}" {{ 'selected' if topic.category == cat.id }}>
          {{ cat.icon }} {{ cat.label }}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group">
      <label for="priority">Priority</label>
      <select id="priority" name="priority">
        <option value="high"   {{ 'selected' if topic.priority == 'high' }}>🔴 High</option>
        <option value="medium" {{ 'selected' if topic.priority == 'medium' }}>🟡 Medium</option>
        <option value="low"    {{ 'selected' if topic.priority == 'low' }}>🟢 Low</option>
      </select>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn-primary">Save Changes</button>
      <a href="{{ url_for('topics') }}" class="btn-secondary">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
